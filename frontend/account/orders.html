<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои заказы - Photobond</title>
    <link rel="stylesheet" href="/frontend/styles.css">
    <link rel="stylesheet" href="/frontend/account/account.css">
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <div id="header-container"></div>

    <div class="account-layout">
        <!-- Боковое меню -->
        <aside class="account-sidebar">
                        <nav class="account-nav">
                <a href="index.html" class="account-nav-item">Обзор</a>
                <a href="projects.html" class="account-nav-item">
                    Проекты
                    <span class="nav-count" id="projects-count">0</span>
                </a>
                <a href="orders.html" class="account-nav-item active">
                    Заказы
                    <span class="nav-count" id="orders-count">0</span>
                </a>
                <a href="galleries.html" class="account-nav-item">
                    Галереи
                    <span class="nav-count" id="galleries-count">0</span>
                </a>
                <div class="account-nav-divider"></div>
                <a href="settings.html" class="account-nav-item">Настройки</a>
                <button class="account-logout" id="logout-btn">Выход</button>
            </nav>
        </aside>

        <!-- Основной контент -->
        <main class="account-main">
            <h1 class="account-page-title">История заказов</h1>
            <p class="account-page-subtitle">Все ваши заказы и их статусы</p>

            <!-- Фильтры -->
            <div class="filters-bar">
                <div class="filter-group">
                    <label>Статус</label>
                    <select class="filter-select" id="filter-status">
                        <option value="all">Все</option>
                        <option value="processing">В обработке</option>
                        <option value="accepted">Принят в работу</option>
                        <option value="ready">Готов</option>
                    </select>
                </div>
            </div>

            <!-- Список заказов -->
            <div class="orders-list" id="orders-list">
                <!-- Заказы загружаются через JS -->
                
                <!-- Пустое состояние -->
                <div class="empty-state" id="orders-empty" style="display: none;">
                    <p>У вас пока нет заказов</p>
                    <a href="/frontend/index.html" class="btn-outline">Перейти к покупкам</a>
                </div>
            </div>
        </main>
    </div>

    <div id="footer-common-container"></div>

    <script src="/frontend/script.js"></script>
    <script src="/frontend/account/account.js"></script>
</body>
</html>
