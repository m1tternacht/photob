<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - Photobond</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="account.css">
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <div id="header-container"></div>

    <div class="account-layout">
        <aside class="account-sidebar">
            <nav class="account-nav">
                <a href="index.html" class="account-nav-item active">Обзор</a>
                <a href="projects.html" class="account-nav-item">
                    Проекты
                    <span class="nav-count" id="projects-count">0</span>
                </a>
                <a href="orders.html" class="account-nav-item">
                    Заказы
                    <span class="nav-count" id="orders-count">0</span>
                </a>
                <a href="galleries.html" class="account-nav-item">
                    Галереи
                    <span class="nav-count" id="galleries-count">0</span>
                </a>
                <div class="account-nav-divider"></div>
                <a href="settings.html" class="account-nav-item">Настройки</a>
                <button class="account-logout" id="logout-btn">Выход</button>
            </nav>
        </aside>

        <main class="account-main" id="dashboard-root">
            <h1 class="account-page-title">Обзор</h1>

            <!-- Галереи -->
            <section class="account-section">
                <div class="dash-section-header">
                    <h2 class="section-title">Галереи</h2>
                    <span id="dash-galleries-total" style="font-size:13px;color:#999;"></span>
                    <a href="galleries.html" class="dash-section-link">все галереи →</a>
                </div>
                <div class="galleries-grid" id="dash-galleries-grid">
                    <p class="dash-empty">Загрузка...</p>
                </div>
            </section>

            <!-- Проекты -->
            <section class="account-section">
                <div class="dash-section-header">
                    <h2 class="section-title">Проекты</h2>
                    <span id="dash-projects-total" style="font-size:13px;color:#999;"></span>
                    <a href="projects.html" class="dash-section-link">все проекты →</a>
                </div>
                <div class="galleries-grid" id="dash-projects-grid">
                    <p class="dash-empty">Загрузка...</p>
                </div>
            </section>

            <!-- Заказы -->
            <section class="account-section">
                <div class="dash-section-header">
                    <h2 class="section-title">Заказы</h2>
                    <span id="dash-orders-total" style="font-size:13px;color:#999;"></span>
                    <a href="orders.html" class="dash-section-link">все заказы →</a>
                </div>
                <div class="galleries-grid" id="dash-orders-grid">
                    <p class="dash-empty">Загрузка...</p>
                </div>
            </section>
        </main>
    </div>

    <div id="footer-common-container"></div>

    <script src="../script.js"></script>
    <script src="account.js"></script>
</body>
</html>
